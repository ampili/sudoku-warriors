name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good openjdk-17-jdk unzip zip

    - name: Install Buildozer & Tools via Pip
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Compile APK Using Shell Commands
      run: |
        # 'yes |' automatically accepts Android SDK licenses in headless environments
        yes | buildozer android debug

    - name: Upload Downloadable APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sudoku-Warriors-APK
        path: bin/*.apk
